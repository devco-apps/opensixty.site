<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <link rel="icon" type="image/png" href="public/images/logo.png">
    <link rel="apple-touch-icon" href="public/images/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <img src="public/images/logo-with-text.svg" alt="OpenSixty Logo" class="main-logo">
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Launching Soon!</h1>
            <p class="description">We're working hard to bring you something amazing.</p>
            
            <div class="countdown-container">
                <div class="countdown-item">
                    <span id="days">00</span>
                    <label>Days</label>
                </div>
                <div class="countdown-item">
                    <span id="hours">00</span>
                    <label>Hours</label>
                </div>
                <div class="countdown-item">
                    <span id="minutes">00</span>
                    <label>Minutes</label>
                </div>
                <div class="countdown-item">
                    <span id="seconds">00</span>
                    <label>Seconds</label>
                </div>
            </div>

            <div>
                <h2>Stay tuned for updates!</h2>
            </div>

            <!-- <div class="subscribe-form">
                <h2>Get Notified When We Launch!</h2>
                <form id="email-form">
                    <input type="email" id="email-input" placeholder="Enter your email address" required aria-label="Email address for notifications">
                    <button type="submit">Subscribe</button>
                </form>
                <p id="form-message" aria-live="polite"></p>
            </div> -->
        </section>

    </main>

    <footer>
        <p>&copy; 2026 OpenSixty (Pvt) Ltd All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
